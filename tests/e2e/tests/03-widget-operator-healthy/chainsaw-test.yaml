apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: widget-operator-healthy
spec:
  description: "Phase 2 — Verify Widget CRD is installed and the widget-operator Deployment is Ready on the us spoke"
  steps:
  - try:
    - assert:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: widgets.platform.example.com
        timeout: 30s
    cluster: us
  - try:
    - script:
        content: |
          kubectl rollout status deployment/widget-operator -n default --timeout=60s
        timeout: 90s
    cluster: us