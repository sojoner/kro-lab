apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: widget-operator-healthy
spec:
  description: "Phase 2 — Verify Widget CRD is installed and the widget-operator Deployment is Ready on the us spoke"
  steps:
  - try:
    - assert:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: widgets.platform.example.com
        timeout: 30s
    cluster: us
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: widget-operator
            namespace: default
          status:
            readyReplicas: 1
        timeout: 60s
    cluster: us
