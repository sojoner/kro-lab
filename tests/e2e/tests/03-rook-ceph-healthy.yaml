apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: rook-ceph-healthy
spec:
  description: "Phase 2 — Verify Rook/Ceph is healthy on us cluster"
  steps:
  - try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            namespace: rook-ceph
            name: rook-ceph-operator
        timeout: 2m
    cluster: us
  - try:
    - script:
        timeout: 3m
        content: |
          kubectl --kubeconfig "${CHAINSAW_KUBECONFIG_US}" -n rook-ceph exec deploy/rook-ceph-tools -- ceph status | grep -E 'HEALTH_(OK|WARN)'
    cluster: us