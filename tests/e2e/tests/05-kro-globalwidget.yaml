apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kro-globalwidget-rgd
spec:
  description: "Phase 4 — Verify Kro GlobalWidget RGD creates RegionalWidgetRequest"
  steps:
  - try:
    - apply:
        file: ../../deploy/platform-mvp/kro/globalwidget-rgd.yaml
    cluster: hub
  - try:
    - apply:
        resource:
          apiVersion: platform.example.com/v1alpha1
          kind: GlobalWidget
          metadata:
            name: e2e-test-widget
          spec:
            regions: [us]
            message: "hello from e2e"
    cluster: hub
  - try:
    - assert:
        resource:
          apiVersion: platform.example.com/v1alpha1
          kind: RegionalWidgetRequest
          metadata:
            name: e2e-test-widget-us
        timeout: 30s
    cluster: hub