apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-rotator
  namespace: default
  labels:
    app: token-rotator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-rotator
  template:
    metadata:
      labels:
        app: token-rotator
    spec:
      serviceAccountName: token-rotator
      containers:
        - name: token-rotator
          image: {{ .Values.tokenRotator.image.repository }}:{{ .Values.tokenRotator.image.tag }}
          args:
            - --dex-issuer={{ .Values.tokenRotator.dexIssuer }}
            - --kubeconfig-secret-suffix=-access-kubeconfig
          env:
            - name: DEX_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: token-rotator-dex
                  key: client-secret
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: token-rotator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: token-rotator
rules:
- apiGroups: ["multicluster.x-k8s.io"]
  resources: ["clusterprofiles"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: token-rotator
subjects:
- kind: ServiceAccount
  name: token-rotator
  namespace: default
roleRef:
  kind: ClusterRole
  name: token-rotator
  apiGroup: rbac.authorization.k8s.io