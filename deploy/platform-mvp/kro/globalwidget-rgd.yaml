apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: globalwidget.platform.example.com
spec:
  schema:
    apiVersion: v1alpha1
    kind: GlobalWidget
    group: platform.example.com
    spec:
      regions: '[]string | description="Regions to provision widgets in (us, eu, asia)"'
      message: string | default="" description="Payload carried through to each region's Widget"
      tenant: 'map[string]interface{} | description="Optional tenant identity for spoke-side namespace isolation"'
    status:
      regions: ${regionalWidgetRequest.map(r, r.status)}
  resources:
    - id: regionalWidgetRequest
      template:
        apiVersion: platform.example.com/v1alpha1
        kind: RegionalWidgetRequest
        metadata:
          name: "${schema.metadata.name}-${region}"
        spec:
          region: "${region}"
          message: "${schema.spec.message}"
          tenant: '${schema.spec.tenant has "id" ? schema.spec.tenant : {}}'
      forEach:
        - region: "${schema.spec.regions}"
