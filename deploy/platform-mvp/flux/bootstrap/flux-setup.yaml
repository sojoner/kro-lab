apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/sojoner/kro-lab
  ref:
    branch: main
  ignore: |
    /*
    !/deploy
    !/tests
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 1m
  path: ./deploy/platform-mvp/flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform
  postBuild:
    substitute:
      ingress_host: bm4080.taildf7067.ts.net
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring