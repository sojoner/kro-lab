kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.30.0
    kubeadmConfigPatches:
    - |
      kind: ClusterConfiguration
      apiServer:
        extraArgs:
          authentication-config: "/etc/kubernetes/auth/authentication-configuration.yaml"
        extraVolumes:
          - name: auth-config
            hostPath: /etc/kubernetes/auth
            mountPath: /etc/kubernetes/auth
            readOnly: true
    extraMounts:
      - hostPath: /tmp/kro-us-auth
        containerPath: /etc/kubernetes/auth
        readOnly: true
  - role: worker
    image: kindest/node:v1.30.0