# Per-tenant RBAC templates for spoke clusters.
# These are created by the binding-controller or a bootstrap job when a new
# tenant is detected. The tenant namespace must exist before Widgets can be
# created in it.

{{- range .Values.tenants }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .id }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: widget-controller
  namespace: {{ .id }}
rules:
- apiGroups: ["platform.example.com"]
  resources: ["widgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["platform.example.com"]
  resources: ["widgets/status"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .id }}-widget-controller
  namespace: {{ .id }}
subjects:
{{- range .dexGroups }}
- kind: Group
  name: {{ . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
roleRef:
  kind: Role
  name: widget-controller
  apiGroup: rbac.authorization.k8s.io
{{- end }}