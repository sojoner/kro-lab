{{- if .Values.widgetOperator.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: Widget
    listKind: WidgetList
    plural: widgets
    singular: widget
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                message:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Ready"]
                endpoint:
                  type: string
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: widget-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: widget-operator
rules:
  - apiGroups: ["platform.example.com"]
    resources: ["widgets", "widgets/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: widget-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: widget-operator
subjects:
  - kind: ServiceAccount
    name: widget-operator
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: widget-operator
  namespace: default
  labels:
    app: widget-operator
spec:
  replicas: {{ .Values.widgetOperator.replicas }}
  selector:
    matchLabels:
      app: widget-operator
  template:
    metadata:
      labels:
        app: widget-operator
    spec:
      serviceAccountName: widget-operator
      containers:
        - name: widget-operator
          image: "{{ .Values.widgetOperator.image.repository }}:{{ .Values.widgetOperator.image.tag }}"
          imagePullPolicy: {{ .Values.widgetOperator.image.pullPolicy }}
          args:
            - --ready-delay={{ .Values.widgetOperator.readyDelay }}
          resources:
            {{- toYaml .Values.widgetOperator.resources | nindent 12 }}
{{- end }}
