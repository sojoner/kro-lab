{{ if .Values.authConfiguration.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-configuration
  namespace: kube-system
data:
  authentication-configuration.yaml: |
    apiVersion: apiserver.config.k8s.io/v1beta1
    kind: AuthenticationConfiguration
    jwt:
    {{- if .Values.authConfiguration.hubIssuer.enabled }}
      - issuer:
          url: {{ .Values.authConfiguration.hubIssuer.url | quote }}
          audiences:
            - {{ .Values.authConfiguration.hubIssuer.audience | quote }}
          {{- if .Values.authConfiguration.hubIssuer.certificateAuthority }}
          certificateAuthority: {{ .Values.authConfiguration.hubIssuer.certificateAuthority | quote }}
          {{- end }}
        {{- if .Values.authConfiguration.hubIssuer.claimValidationRules }}
        claimValidationRules:
{{ toYaml .Values.authConfiguration.hubIssuer.claimValidationRules | indent 10 }}
        {{- end }}
        claimMappings:
{{ toYaml .Values.authConfiguration.hubIssuer.claimMappings | indent 10 }}
    {{- end }}
    {{- if .Values.authConfiguration.dexIssuer.enabled }}
      - issuer:
          url: {{ .Values.authConfiguration.dexIssuer.url | quote }}
          audiences:
{{ toYaml .Values.authConfiguration.dexIssuer.audiences | indent 12 }}
          {{- if .Values.authConfiguration.dexIssuer.certificateAuthority }}
          certificateAuthority: {{ .Values.authConfiguration.dexIssuer.certificateAuthority | quote }}
          {{- end }}
        {{- if .Values.authConfiguration.dexIssuer.claimValidationRules }}
        claimValidationRules:
{{ toYaml .Values.authConfiguration.dexIssuer.claimValidationRules | indent 10 }}
        {{- end }}
        claimMappings:
{{ toYaml .Values.authConfiguration.dexIssuer.claimMappings | indent 10 }}
    {{- end }}
{{ end }}