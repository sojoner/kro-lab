{{ if .Values.admissionPolicies.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-admin
  labels:
    app.kubernetes.io/part-of: platform-mvp
    security.platform.example.com/role: platform-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-admin-dex
  labels:
    app.kubernetes.io/part-of: platform-mvp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-admin
subjects:
{{- range .Values.admissionPolicies.platformAdminSubjects }}
  - kind: {{ .kind }}
    name: {{ .name }}
    apiGroup: {{ .apiGroup | default "rbac.authorization.k8s.io" }}
{{- end }}
{{ end }}