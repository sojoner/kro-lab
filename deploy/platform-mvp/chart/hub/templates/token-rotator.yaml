{{- if .Values.tokenRotator.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: token-rotator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: token-rotator
rules:
- apiGroups: ["multicluster.x-k8s.io"]
  resources: ["clusterprofiles"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: token-rotator
subjects:
- kind: ServiceAccount
  name: token-rotator
  namespace: default
roleRef:
  kind: ClusterRole
  name: token-rotator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-rotator
  namespace: default
  labels:
    app: token-rotator
spec:
  replicas: {{ .Values.tokenRotator.replicas }}
  selector:
    matchLabels:
      app: token-rotator
  template:
    metadata:
      labels:
        app: token-rotator
    spec:
      serviceAccountName: token-rotator
      containers:
        - name: token-rotator
          image: "{{ .Values.tokenRotator.image.repository }}:{{ .Values.tokenRotator.image.tag }}"
          imagePullPolicy: {{ .Values.tokenRotator.image.pullPolicy }}
          args:
            - --dex-issuer={{ .Values.tokenRotator.dexIssuer }}
            - --kubeconfig-secret-suffix={{ .Values.tokenRotator.kubeconfigSecretSuffix }}
          env:
            - name: DEX_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tokenRotator.dexSecretName }}
                  key: {{ .Values.tokenRotator.dexSecretKey }}
          resources:
            {{- toYaml .Values.tokenRotator.resources | nindent 12 }}
{{- end }}