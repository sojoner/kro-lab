{{- if (index .Values "cert-manager" "enabled") }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-tls
  namespace: monitoring
spec:
  secretName: ingress-tls
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - platform-mvp
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
{{ end }}