apiVersion: v1
kind: ConfigMap
metadata:
  name: chainsaw-tests
  namespace: monitoring
data:
  .chainsaw.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Configuration
    metadata:
      name: platform-mvp
    spec:
      timeouts:
        apply: 30s
        assert: 60s
        cleanup: 30s
        delete: 30s
        error: 10s
        exec: 5m
      failFast: true
      parallel: 1
      skipDelete: false
      reportFormat: JSON
      reportName: chainsaw-report
      fullName: true
      clusters:
        hub:
          kubeconfig: /tmp/chainsaw/kubeconfig-hub
        us:
          kubeconfig: /tmp/chainsaw/kubeconfig-us-internal
  01-hub-cluster-ready.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: hub-cluster-ready
    spec:
      description: "Phase 1 — Verify hub cluster is operational"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: v1
              kind: Node
            count: 1
        cluster: hub
  02-us-cluster-ready.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: us-cluster-ready
    spec:
      description: "Phase 1 — Verify us spoke cluster is operational"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: v1
              kind: Node
            count: 2
        cluster: us
  03-rook-ceph-healthy.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: rook-ceph-healthy
    spec:
      description: "Phase 2 — Verify Rook/Ceph is healthy on us"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: rook-ceph
                name: rook-ceph-operator
            timeout: 2m
        cluster: us
      - try:
        - script:
            timeout: 3m
            content: |
              kubectl --kubeconfig /tmp/chainsaw/kubeconfig-us-internal -n rook-ceph exec deploy/rook-ceph-tools -- ceph status | grep -E 'HEALTH_(OK|WARN)'
        cluster: us
  04-fleet-registration.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: fleet-registered
    spec:
      description: "Phase 3 — Verify fleet registration"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: multicluster.x-k8s.io/v1alpha1
              kind: ClusterProfile
              metadata:
                name: us
                namespace: default
            timeout: 30s
        cluster: hub
  05-kro-globalbucket.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: kro-globalbucket-rgd
    spec:
      description: "Phase 4 — Verify Kro RGD creates RegionalBucketRequest"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: platform.example.com/v1alpha1
              kind: RegionalBucketRequest
              metadata:
                name: e2e-test-bucket-us
            timeout: 30s
        cluster: hub
  06-binding-controller.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: binding-controller-creates-spoke-resources
    spec:
      description: "Phase 5 — Verify binding controller creates Rook resources on us"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: ceph.rook.io/v1
              kind: CephObjectStoreUser
              metadata:
                namespace: rook-ceph
                name: e2e-test-bucket-us
            timeout: 30s
        cluster: us
      - try:
        - assert:
            resource:
              apiVersion: objectbucket.io/v1alpha1
              kind: ObjectBucketClaim
              metadata:
                namespace: rook-ceph
                name: e2e-test-bucket-us
            timeout: 30s
        cluster: us
  07-observability-stack.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: observability-stack-healthy
    spec:
      description: "Phase 7 — Verify LGTM observability stack is deployed and healthy"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: monitoring
                name: hub-kube-prometheus-stack-operator
            timeout: 2m
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                namespace: monitoring
                name: prometheus-hub-kube-prometheus-stack-prometheus
            timeout: 3m
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: monitoring
                name: hub-grafana
            timeout: 2m
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                namespace: monitoring
                name: loki
            timeout: 2m
        cluster: hub
      - try:
        - script:
            timeout: 30s
            content: |
              kubectl --kubeconfig /tmp/chainsaw/kubeconfig-hub -n monitoring wait --for=condition=Available deploy/hub-grafana --timeout=30s
        cluster: hub
      - try:
        - script:
            timeout: 30s
            content: |
              kubectl --kubeconfig /tmp/chainsaw/kubeconfig-hub -n monitoring rollout status statefulset/loki --timeout=30s
        cluster: hub
      - try:
        - script:
            timeout: 60s
            content: |
              kubectl --kubeconfig /tmp/chainsaw/kubeconfig-hub -n monitoring port-forward svc/hub-grafana 3000:80 &
              PF_PID=$!
              sleep 5
              HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000")
              kill $PF_PID 2>/dev/null || true
              [ "$HEALTH" = "200" ] || exit 1
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: monitoring.coreos.com/v1
              kind: ServiceMonitor
              metadata:
                namespace: monitoring
                name: binding-controller
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: monitoring.coreos.com/v1
              kind: ServiceMonitor
              metadata:
                namespace: monitoring
                name: rook-ceph-mgr
        cluster: hub
  08-chainsaw-cronjob.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: chainsaw-cronjob-running
    spec:
      description: "Phase 7 — Verify Chainsaw CronJob is deployed"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: batch/v1
              kind: CronJob
              metadata:
                namespace: monitoring
                name: chainsaw-runner
            timeout: 30s
        cluster: hub
  09-ingress-log-shipping.yaml: |
    apiVersion: chainsaw.kyverno.io/v1alpha1
    kind: Test
    metadata:
      name: ingress-and-log-shipping
    spec:
      description: "Phase 7 — Verify ingress controller, Grafana ingress, event exporter, and Loki ready"
      steps:
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: monitoring
                name: hub-ingress-nginx-controller
            timeout: 2m
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                namespace: monitoring
                name: grafana
            timeout: 30s
        cluster: hub
      - try:
        - script:
            timeout: 60s
            content: |
              INGRESS_POD_IP=$(kubectl --kubeconfig /tmp/chainsaw/kubeconfig-hub -n monitoring get pod -l app.kubernetes.io/name=ingress-nginx -o jsonpath='{.items[0].status.podIP}')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: bm4080.taildf7067.ts.net" "http://${INGRESS_POD_IP}/api/health" 2>/dev/null || echo "000")
              echo "Grafana health via ingress: HTTP ${STATUS}"
              [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || exit 1
        cluster: hub
      - try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                namespace: monitoring
                name: event-exporter
            timeout: 2m
        cluster: hub
      - try:
        - script:
            timeout: 30s
            content: |
              kubectl --kubeconfig /tmp/chainsaw/kubeconfig-hub -n monitoring port-forward svc/loki 13100:3100 &
              PF_PID=$!
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:13100/ready || echo "000")
              kill $PF_PID 2>/dev/null || true
              [ "$STATUS" = "200" ] || exit 1
              echo "Loki ready and accepting pushes"
        cluster: hub