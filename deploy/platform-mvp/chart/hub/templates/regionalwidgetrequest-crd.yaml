apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: regionalwidgetrequests.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: RegionalWidgetRequest
    listKind: RegionalWidgetRequestList
    plural: regionalwidgetrequests
    singular: regionalwidgetrequest
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Region
          type: string
          jsonPath: .spec.region
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [region]
              properties:
                region:
                  type: string
                  enum: [us, eu, asia]
                message:
                  type: string
                  default: ""
            status:
              type: object
              properties:
                regions:
                  type: array
                  items:
                    type: object
                    properties:
                      region:
                        type: string
                      phase:
                        type: string
                      endpoint:
                        type: string
