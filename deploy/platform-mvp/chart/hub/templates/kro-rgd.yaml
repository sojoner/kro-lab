apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: globalbucket.platform.example.com
spec:
  schema:
    apiVersion: v1alpha1
    kind: GlobalBucket
    group: platform.example.com
    spec:
      regions: '[]string | description="Regions to provision buckets in (us, eu, asia)"'
      sizeGiB: integer | default=10 description="Bucket size in GiB"
      versioned: boolean | default=false description="Enable bucket versioning"
    status:
      regions: ${regionalBucketRequest.map(r, r.status)}
  resources:
    - id: regionalBucketRequest
      template:
        apiVersion: platform.example.com/v1alpha1
        kind: RegionalBucketRequest
        metadata:
          name: "${schema.metadata.name}-${region}"
        spec:
          region: "${region}"
          sizeGiB: ${schema.spec.sizeGiB}
          versioned: ${schema.spec.versioned}
      forEach:
        - region: "${schema.spec.regions}"
