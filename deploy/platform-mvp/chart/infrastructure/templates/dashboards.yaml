{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name }}
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  {{ $name }}.json: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}