# ingress-nginx Helm values for kind
# Upstream: ingress-nginx/ingress-nginx
# Usage: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx -f this.yaml

controller:
  replicaCount: 1
  ingressClassResource:
    name: nginx
    default: false
  service:
    type: ClusterIP
  hostPort:
    enabled: true
    ports:
      http: 30080
      https: 30443
  kind: Deployment
  resources:
    requests:
      cpu: 50m
      memory: 90Mi
    limits:
      cpu: 200m
      memory: 256Mi