# Promtail Helm values — ships container logs to Loki
# Upstream: grafana/promtail
# Usage: helm upgrade --install promtail grafana/promtail -n monitoring -f this.yaml

config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push
      batchwait: 1s
      batchsize: 1048576
  snippets:
    extraRelabelConfigs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_app, __meta_kubernetes_pod_controller_name, __meta_kubernetes_pod_name]
        regex: '^;*([^;]+)(;.*)?$'
        target_label: app

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi